<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 2 - Cards | IT3K6 Sun Kepeng</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .nav-bar { background: white; padding: 15px 30px; border-radius: 15px; margin: 20px auto; max-width: 1200px; display: flex; gap: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); }
        .nav-bar a { color: #667eea; text-decoration: none; font-weight: 600; padding: 8px 16px; border-radius: 8px; transition: all 0.3s; }
        .nav-bar a:hover { background: #f0f0f0; }
        .nav-bar a.active { background: #667eea; color: white; }
        .github-link { margin-left: auto; color: #333; font-size: 14px; }
        .github-link a { color: #667eea; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [entities, setEntities] = useState([
                { id: 1, name: 'React Framework', description: 'JavaScript library for building user interfaces', date: '2024-01-15' },
                { id: 2, name: 'Redux Toolkit', description: 'Official toolset for efficient Redux development', date: '2024-02-20' },
                { id: 3, name: 'React Router', description: 'Declarative routing for React applications', date: '2024-03-10' },
                { id: 4, name: 'Git Version Control', description: 'Distributed version control system', date: '2024-04-05' }
            ]);

            const [name, setName] = useState('');
            const [description, setDescription] = useState('');
            const [category, setCategory] = useState('');

            const handleAdd = (e) => {
                e.preventDefault();
                if (!name.trim() || !description.trim()) return;
                setEntities([...entities, {
                    id: Date.now(),
                    name: name.trim(),
                    description: description.trim(),
                    category: category.trim() || 'General',
                    date: new Date().toISOString().split('T')[0]
                }]);
                setName(''); setDescription(''); setCategory('');
            };

            const handleDelete = (id) => {
                setEntities(entities.filter(item => item.id !== id));
            };

            return (
                <div>
                    <div className="nav-bar">
                        <a href="lab1_git.html">Lab 1: Git</a>
                        <a href="lab2_cards.html" className="active">Lab 2: Cards</a>
                        <a href="lab3_login.html">Lab 3: Login</a>
                        <a href="lab4_redux.html">Lab 4: Redux</a>
                        <div className="github-link">
                            <a href="https://github.com/skpae/skp" target="_blank">🐙 GitHub Repo</a>
                        </div>
                    </div>

                    <div className="container">
                        <div className="page-header">
                            <h2>📋 Lab 2: Entity Cards</h2>
                            <p>Разработка страницы для отображения карточек с сущностями и формой добавления</p>
                        </div>

                        <div className="add-form">
                            <h3>➕ Add New Entity</h3>
                            <form onSubmit={handleAdd} className="form-row">
                                <div className="input-group">
                                    <label>Name</label>
                                    <input type="text" value={name} onChange={(e) => setName(e.target.value)} placeholder="Entity name" required />
                                </div>
                                <div className="input-group">
                                    <label>Category</label>
                                    <input type="text" value={category} onChange={(e) => setCategory(e.target.value)} placeholder="Category" />
                                </div>
                                <div className="input-group">
                                    <label>Description</label>
                                    <input type="text" value={description} onChange={(e) => setDescription(e.target.value)} placeholder="Description" required />
                                </div>
                                <button type="submit" className="btn-add">Add</button>
                            </form>
                        </div>

                        <div className="cards-grid">
                            {entities.length === 0 ? (
                                <div className="empty-state"><p>No entities yet. Add your first entity above!</p></div>
                            ) : (
                                entities.map(entity => (
                                    <div key={entity.id} className="card-item">
                                        <button className="btn-delete" onClick={() => handleDelete(entity.id)} title="Delete">×</button>
                                        <div className="card-id">ID: {entity.id}</div>
                                        <div className="card-name">{entity.name}</div>
                                        <div className="card-desc">{entity.description}</div>
                                        <div className="card-date">📅 {entity.date}</div>
                                    </div>
                                ))
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
